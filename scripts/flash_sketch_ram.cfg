# Used with Arduino UNO Q kernel 0.54.x: kernel waits at BKPT (0x0800550c),
# reads buffer address from 0x20000000, and loads the LLEXT ELF into that RAM buffer.

reset_config srst_only srst_push_pull

init
reset
halt
resume
sleep 500

lassign [split [mdw 0x20000000] ":" ] ram base
set base [string trim $base]
puts $base
load_image ${filename} 0x$base bin
sleep 500
resume
shutdown
