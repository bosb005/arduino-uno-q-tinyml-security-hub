<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="agrad_teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agrad_blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agrad_purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BA68C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:1" />
    </linearGradient>
    <filter id="adropshadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="aarrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0097A7" />
    </marker>
    <marker id="barrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976D2" />
    </marker>
    <marker id="carrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976D2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#F5F7FA"/>

  <!-- Top teal bar -->
  <rect width="600" height="6" fill="url(#agrad_teal)"/>

  <!-- ====== Stage 1: INMP441 Microphone ====== -->
  <g>
    <!-- Microphone box -->
    <rect x="30" y="80" width="80" height="80" rx="8" fill="url(#agrad_teal)" filter="url(#adropshadow)"/>
    <text x="70" y="125" font-size="14" font-weight="bold" text-anchor="middle" fill="white">INMP441</text>
    <text x="70" y="145" font-size="11" text-anchor="middle" fill="white">Microphone</text>
    
    <!-- Icon: speaker/microphone -->
    <circle cx="70" cy="105" r="6" fill="white" opacity="0.8"/>
  </g>

  <!-- Arrow 1: I2S -->
  <g>
    <line x1="110" y1="120" x2="145" y2="120" stroke="#0097A7" stroke-width="3" marker-end="url(#aarrow)"/>
    <text x="127" y="110" font-size="10" text-anchor="middle" fill="#0097A7" font-weight="bold">I2S</text>
  </g>

  <!-- ====== Stage 2: STM32 MCU ====== -->
  <g>
    <!-- MCU box (large container) -->
    <rect x="145" y="50" width="140" height="140" rx="8" fill="url(#agrad_blue)" filter="url(#adropshadow)"/>
    <text x="215" y="68" font-size="13" font-weight="bold" text-anchor="middle" fill="white">STM32 MCU</text>
    
    <!-- Internal stages -->
    <!-- DMA Buffer -->
    <rect x="155" y="80" width="50" height="32" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1"/>
    <text x="180" y="102" font-size="9" font-weight="bold" text-anchor="middle" fill="white">DMA</text>
    
    <!-- Down arrow -->
    <line x1="180" y1="112" x2="180" y2="128" stroke="white" stroke-width="2"/>
    
    <!-- MFCC -->
    <rect x="155" y="128" width="50" height="32" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1"/>
    <text x="180" y="150" font-size="9" font-weight="bold" text-anchor="middle" fill="white">MFCC</text>
    
    <!-- Right column -->
    <!-- NN Inference -->
    <rect x="220" y="80" width="50" height="32" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1"/>
    <text x="245" y="97" font-size="8" font-weight="bold" text-anchor="middle" fill="white">TinyML</text>
    <text x="245" y="108" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Inference</text>
    
    <!-- INT8 Badge -->
    <rect x="220" y="120" width="50" height="20" rx="3" fill="rgba(255,215,0,0.3)" stroke="#FFD700" stroke-width="1"/>
    <text x="245" y="133" font-size="8" font-weight="bold" text-anchor="middle" fill="#FFD700">INT8 Quant</text>
  </g>

  <!-- Arrow 2: Serial JSON -->
  <g>
    <line x1="285" y1="120" x2="320" y2="120" stroke="#1976D2" stroke-width="3" marker-end="url(#barrow)"/>
    <text x="302" y="110" font-size="10" text-anchor="middle" fill="#1976D2" font-weight="bold">Serial</text>
    <text x="302" y="135" font-size="9" text-anchor="middle" fill="#1976D2">JSON</text>
  </g>

  <!-- ====== Stage 3: Linux ====== -->
  <g>
    <!-- Linux box -->
    <rect x="320" y="80" width="100" height="80" rx="8" fill="url(#agrad_blue)" filter="url(#adropshadow)"/>
    <text x="370" y="102" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Linux Side</text>
    <text x="370" y="125" font-size="10" text-anchor="middle" fill="white">Flask App</text>
    <text x="370" y="140" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">SSE Stream</text>
  </g>

  <!-- Arrow 3: HTTP/SSE -->
  <g>
    <line x1="420" y1="120" x2="455" y2="120" stroke="#1976D2" stroke-width="3" marker-end="url(#carrow)"/>
    <text x="437" y="110" font-size="10" text-anchor="middle" fill="#1976D2" font-weight="bold">HTTP</text>
  </g>

  <!-- ====== Stage 4: Browser Dashboard ====== -->
  <g>
    <!-- Browser/Dashboard box -->
    <rect x="455" y="80" width="105" height="80" rx="8" fill="url(#agrad_purple)" filter="url(#adropshadow)"/>
    <text x="507" y="102" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Dashboard</text>
    <text x="507" y="125" font-size="10" text-anchor="middle" fill="white">Real-time UI</text>
    <text x="507" y="140" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Browser</text>
  </g>

  <!-- ====== Legend / Key Specs ====== -->
  <g>
    <!-- Specs box -->
    <rect x="30" y="200" width="530" height="160" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- Title -->
    <text x="45" y="225" font-size="12" font-weight="bold" fill="#333">🔒 Privacy-First Edge AI Pipeline</text>
    
    <!-- Specs columns -->
    <g>
      <text x="45" y="250" font-size="10" font-weight="bold" fill="#555">Audio Capture:</text>
      <text x="45" y="265" font-size="9" fill="#777">• 16 kHz mono I2S</text>
      <text x="45" y="278" font-size="9" fill="#777">• 1024-sample frames</text>
      
      <text x="200" y="250" font-size="10" font-weight="bold" fill="#555">MCU Processing:</text>
      <text x="200" y="265" font-size="9" fill="#777">• 13-coeff MFCC</text>
      <text x="200" y="278" font-size="9" fill="#777">• 4-class TinyML NN</text>
      
      <text x="365" y="250" font-size="10" font-weight="bold" fill="#555">Output Events:</text>
      <text x="365" y="265" font-size="9" fill="#777">• presence, anomaly</text>
      <text x="365" y="278" font-size="9" fill="#777">• manual_trigger, idle</text>
    </g>
    
    <!-- Privacy note -->
    <rect x="45" y="290" width="510" height="50" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="55" y="308" font-size="9" font-weight="bold" fill="#2E7D32">✓ No cloud streaming • No audio uploaded • All inference local</text>
    <text x="55" y="323" font-size="9" font-weight="bold" fill="#2E7D32">✓ Only JSON event metadata (event type + confidence) sent to dashboard</text>
  </g>

  <!-- Bottom accent line -->
  <rect y="394" width="600" height="6" fill="url(#agrad_teal)"/>
</svg>
